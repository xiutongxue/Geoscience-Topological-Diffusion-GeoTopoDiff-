# Context mean ring (for mean-anchoring the target)
# Mask dilation pixels: critical parameter
# 1px: resolves minor edge misses
# 2px: stronger denoising effect (anchor farther from edge)
# === Boundary Gradient / Direction Prior (new) ===

mask_dilate_pixels: 0
# Context Mean dynamic ring (default true)
# Discrete table: all three syntax formats are supported
# Whether to clip generated results to [-1, 1] (usually must be true, otherwise over-saturation/noise may occur)
clip_denoised: true

# Whether to use DDIM accelerated sampling (False uses standard DDPM)
use_ddim: false

# If the model is class-conditional, force the generated class (e.g. FMI has specific lithology classes)
# Leave empty for random sampling
cond_y: null  # or a specific integer class ID, e.g. 0
# HSG Stat dynamic ring (default true)


# HSG statistics ring (for mean/variance consistency)
# === Seam / boundary match prior ===

# === Context Mean Prior: local mean amplitude anchoring (prevents darkening/pulling dark) ===

# === Row Interp Prior (new: full-height stripes rely more on left/right known pixels) ===
# Only enabled for near-full-height vertical stripe columns (controlled by stripe_thr)
# Narrow gap threshold: holes smaller than 12 pixels are treated as cracks/lines, with aggressive interpolation
# This means each extended pixel's brightness is multiplied by 0.9, rapid decay to avoid "laser sword" artifacts
# New key parameter (add to conf.get if desired)
# === HSG (Option 2: horizontal stripe structural consistency guidance) ===
# Goal: make the inpainted region seamlessly join left/right known regions horizontally, reducing block drift / seam artifacts

# Boundary alignment: late-stage enhancement (finishing)

# Horizontal smoothing: stronger early, weaker later (prevents vertical fractures)

# Statistical consistency: assists against whole-block darkening/brightening

# === Prevent "black columns": vertical constraints disabled by default for full-height stripe columns ===
depth_exclude_stripe: true
vertical_smooth_exclude_stripe: true
# === Keep-mask-based stripe detection threshold (new) ===

# === Electrode Topology Prior: electrode-direction horizontal consistency (strong early, weak later) ===

# === Depth-direction prior (late-stage enhancement) ===

# === Vertical trend smoothing (late-stage enhancement) ===

# ============================================================
# New: stripe core region denoising smoothing prior
# Low-weight cleanup only, does not replace row_interp
# ============================================================

# ============================================================
# Texture Energy Prior: convergent version, low weight to avoid granular vertical columns
# ============================================================

# Focus: reduce Laplacian and non-directional high frequency

# Only encourage moderate recovery of "insufficient texture", while penalizing excessive high frequency

# Wide stripes and unreliable regions are automatically down-weighted

# === Context Range Prior: limit anomalous over-bright/over-dark in inpainted region ===

# Only penalize beyond mean ± k * std; normal texture variation is not penalized

# Wide stripes are automatically down-weighted

# === Row Interp Anchor Confidence Gate ===

# Wide stripes reduce interpolation push
row_interp_narrow_width: 8
row_interp_wide_width: 24
row_interp_wide_scale: 0.45
# === Physical Prior: depth-direction prior (vertical smoothing) new content ===

# ============================================================
# Coarse Prefill + RePaint Texture Refiner, sampling modification without retraining
# Goal: convert RePaint from a random content generator to a texture refiner on deterministic coarse inpainting
# ============================================================
coarse_prefill_enable: true
coarse_prefill_method: harmonic_width_aware
prefill_wide_row_ratio: 0.0

# Mask width grouping
prefill_narrow_width: 6
prefill_medium_width: 25
prefill_anchor_k: 5
prefill_harmonic_iters: 300
prefill_harmonic_kernel: 8conn
prefill_mask_dilate_for_coarse: 0

# RePaint starts from noisy coarse x0 instead of pure randn
repaint_init_from_coarse: true
repaint_refine_strength: 0.22
repaint_seed_mode: name_hash
repaint_seed_base: 20260525

# High-frequency texture fusion: low frequency from coarse, high frequency from RePaint
texture_fusion_enable: true
texture_fusion_sigma: 1.5
texture_fusion_gain: 0.68
texture_fusion_low_repaint_ratio: 0.13

# Force known-region backfill before final save
final_hard_merge: true

# Debug output
prefill_debug_enable: true
prefill_debug_dir: ./log/FMI/prefill_debug
prefill_debug_max_batches: 10
attention_resolutions: 32,16,8
class_cond: false
diffusion_steps: 1000
learn_sigma: false
noise_schedule: linear
num_channels: 256
num_head_channels: 64
num_heads: 4
num_res_blocks: 2
resblock_updown: true
use_fp16: true
use_scale_shift_norm: true
classifier_scale: 0.0
lr_kernel_n_std: 2
num_samples: 100
show_progress: false
timestep_respacing: '250'
use_kl: false
predict_xstart: false
rescale_timesteps: false
rescale_learned_sigmas: false
classifier_use_fp16: false
classifier_width: 128
classifier_depth: 2
classifier_attention_resolutions: 32,16,8
classifier_use_scale_shift_norm: true
classifier_resblock_updown: true
classifier_pool: attention
num_heads_upsample: -1
channel_mult: ''
dropout: 0.0
use_checkpoint: false
use_new_attention_order: false
latex_name: RePaint
method_name: Repaint
image_size: 256
model_path: ./data/pretrained/model_step_32000.pt
name: FMI_Image
inpa_inj_sched_prev: true
n_jobs: 1
print_estimated_vars: false
inpa_inj_sched_prev_cumnoise: false
schedule_jump_params:
  t_T: 250
  n_sample: 1
  jump_length: 15
  jump_n_sample: 10

